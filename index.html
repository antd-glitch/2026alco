const _cache = {};
async function sGet(key) {
  if(_cache[key]!==undefined) return _cache[key];
  try{
    const r=await fetch(GS_URL+"?action=get&key="+key);
    const j=await r.json();
    const val=j.value?JSON.parse(j.value):null;
    _cache[key]=val; return val;
  }catch{return null;}
}
async function sSet(key,val) {
  _cache[key]=val;
  try{ await fetch(GS_URL+"?action=set&key="+key+"&val="+encodeURIComponent(JSON.stringify(val))); }catch{}
}
async function sGetAll() {
  try{
    const r=await fetch(GS_URL+"?action=getall");
    const j=await r.json();
    if(!j.ok) return {};
    const out={};
    for(const[k,v] of Object.entries(j.data)){
      try{out[k]=v?JSON.parse(v):null;}catch{out[k]=null;}
    }
    return out;
  }catch{return {};}
}

function calcOutcome(hs, as, handicap, pick) {
  const frac = Math.abs(handicap) % 0.5;
  if (frac === 0.25) {
    const sign = handicap >= 0 ? 1 : -1;
    const o1 = calcOutcome(hs, as, handicap - sign*0.25, pick);
    const o2 = calcOutcome(hs, as, handicap + sign*0.25, pick);
    if (o1==="win"  && o2==="win")  return "win";
    if (o1==="lose" && o2==="lose") return "lose";
    if (o1==="win"  || o2==="win")  return "half_win";
    if (o1==="lose" || o2==="lose") return "half_lose";
    return "push";
  }
  const adj = hs + handicap - as;
  const hr = adj > 0 ? "win" : adj < 0 ? "lose" : "push";
  if (pick==="home") return hr;
  if (hr==="win") return "lose";
  if (hr==="lose") return "win";
  return "push";
}

function calcProfit(outcome, stake) {
  if (outcome==="win")       return  stake;
  if (outcome==="lose")      return -stake;
  if (outcome==="half_win")  return  Math.round(stake/2);
  if (outcome==="half_lose") return -Math.round(stake/2);
  return 0;
}

async function sGet(key) {
  try { const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
  catch { return null; }
}
async function sSet(key, val) {
  try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
}
async function sGetAll() {
  try {
    const keys = await window.storage.list("wc26_", true);
    const out = {};
    await Promise.all((keys.keys || []).map(async k => {
      try { const r = await window.storage.get(k, true); if(r) out[k] = JSON.parse(r.value); } catch {}
    }));
    return out;
  } catch { return {}; }
}

// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [screen,   setScreen]  = useState("home");
  const [players,  setPlayers] = useState([]);
  const [activeId, setActiveId]= useState(null);
  const [votes,    setVotes]   = useState({});
  const [results,  setResults] = useState({});
  const [koSetup,  setKoSetup] = useState({});
  const [newName,  setNewName] = useState("");
  const [flash,    setFlash]   = useState("");
  const [loading,  setLoading] = useState(true);
  const [syncing,  setSyncing] = useState(false);
  const [adminOk,  setAdminOk] = useState(false);
  const [adminPw,  setAdminPw] = useState("");
  const [scoreIn,  setScoreIn] = useState({});
  const [koIn,     setKoIn]    = useState({});
  const [roundF,   setRoundF]  = useState("group");
  const [dateF,    setDateF]   = useState("all");
  const ADMIN_PW = "wc2026";

  useEffect(() => {
    sGetAll().then(all => {
      if (all[KEYS.p]) setPlayers(all[KEYS.p]);
      if (all[KEYS.v]) setVotes(all[KEYS.v]);
      if (all[KEYS.r]) setResults(all[KEYS.r]);
      if (all[KEYS.k]) setKoSetup(all[KEYS.k]);
      setLoading(false);
    });
  }, []);

  // auto-refresh mỗi 20s để thấy vote của người khác
  useEffect(() => {
    const id = setInterval(() => {
      sGetAll().then(all => {
        if (all[KEYS.p]) setPlayers(all[KEYS.p]);
        if (all[KEYS.v]) setVotes(all[KEYS.v]);
        if (all[KEYS.r]) setResults(all[KEYS.r]);
        if (all[KEYS.k]) setKoSetup(all[KEYS.k]);
      });
    }, 20000);
    return () => clearInterval(id);
  }, []);

  const flash_ = msg => { setFlash(msg); setTimeout(()=>setFlash(""),2000); };
  const sync = async (key, val) => { setSyncing(true); await sSet(key, val); setSyncing(false); };

  const doRefresh = () => {
    setSyncing(true);
    sGetAll().then(all => {
      if (all[KEYS.p]) setPlayers(all[KEYS.p]);
      if (all[KEYS.v]) setVotes(all[KEYS.v]);
      if (all[KEYS.r]) setResults(all[KEYS.r]);
      if (all[KEYS.k]) setKoSetup(all[KEYS.k]);
      setSyncing(false); flash_("✓ Đã đồng bộ!");
    });
  };

  const addPlayer = async () => {
    const name = newName.trim();
    if (!name) return;
    if (players.find(p=>p.name.toLowerCase()===name.toLowerCase())) { flash_("Tên đã tồn tại!"); return; }
    const next = [...players, { id:"p"+Date.now(), name }];
    setPlayers(next); setNewName(""); flash_("⏳ Đang lưu...");
    await sync(KEYS.p, next); flash_("✓ Đã thêm "+name);
  };
  const removePl = async id => {
    const next = players.filter(p=>p.id!==id);
    setPlayers(next); if(activeId===id) setActiveId(null);
    await sync(KEYS.p, next);
  };

  const handlePick = async (mid, pick) => {
    if (!activeId) { flash_("Chọn người chơi trước!"); return; }
    const cur = (votes[mid]||{})[activeId];
    const next = {...votes, [mid]:{...(votes[mid]||{}), [activeId]: cur===pick ? null : pick}};
    setVotes(next); flash_("⏳ Đang lưu...");
    await sync(KEYS.v, next);
    flash_(cur===pick ? "↩ Bỏ chọn" : "✓ Đã chọn");
  };

  const saveResult = async mid => {
    const s = scoreIn[mid]||{};
    const h = parseInt(s.h??""), a = parseInt(s.a??"");
    if (isNaN(h)||isNaN(a)||h<0||a<0) { flash_("Nhập tỉ số hợp lệ!"); return; }
    const next = {...results, [mid]:{h,a}};
    setResults(next); flash_("⏳ Đang lưu...");
    await sync(KEYS.r, next); flash_("✓ Đã lưu kết quả");
  };
  const clearResult = async mid => {
    const next = {...results}; delete next[mid];
    setResults(next); await sync(KEYS.r, next); flash_("✓ Đã xóa");
  };

  const saveKo = async mid => {
    const k = koIn[mid]||{};
    if (!k.home||!k.away) { flash_("Nhập tên 2 đội!"); return; }
    const next = {...koSetup, [mid]:{home:k.home, away:k.away, handicap:parseFloat(k.handicap||"0")||0}};
    setKoSetup(next); flash_("⏳ Đang lưu...");
    await sync(KEYS.k, next); flash_("✓ Đã lưu trận");
  };

  const calcScores = () => {
    const sc = {};
    players.forEach(p=>{ sc[p.id]={name:p.name,profit:0,won:0,lost:0,hw:0,hl:0,push:0,total:0}; });
    ALL_MATCHES.forEach(m => {
      const res = results[m.id]; if(!res) return;
      const isKo = !!m.slot;
      const setup = isKo ? koSetup[m.id] : null;
      if (isKo && !setup) return;
      const hcap = isKo ? setup.handicap : m.handicap;
      const stake = ROUNDS[m.round].stake;
      players.forEach(p => {
        const pick = (votes[m.id]||{})[p.id]; if(!pick) return;
        sc[p.id].total++;
        const outcome = calcOutcome(res.h, res.a, hcap, pick);
        sc[p.id].profit += calcProfit(outcome, stake);
        if (outcome==="win") sc[p.id].won++;
        else if (outcome==="lose") sc[p.id].lost++;
        else if (outcome==="half_win") sc[p.id].hw++;
        else if (outcome==="half_lose") sc[p.id].hl++;
        else sc[p.id].push++;
      });
    });
    return sc;
  };

  const activePl = players.find(p=>p.id===activeId);
  const scores = calcScores();
  const ranked = Object.entries(scores).sort((a,b)=>b[1].profit-a[1].profit);
  const doneCount = ALL_MATCHES.filter(m=>results[m.id]).length;
  const allDates = [...new Set(GROUP_MATCHES.map(m=>m.date))];
  const curMatches = roundF==="group"
    ? (dateF==="all" ? GROUP_MATCHES : GROUP_MATCHES.filter(m=>m.date===dateF))
    : KO_MATCHES.filter(m=>m.round===roundF);

  const Toast = flash ? (
    <div style={{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",
      background:"#1e293b",color:"#f1f5f9",padding:"8px 20px",borderRadius:20,
      fontSize:13,fontWeight:600,zIndex:999,border:"1px solid #334155",whiteSpace:"nowrap"}}>
      {flash}
    </div>
  ) : null;

  const renderMatch = m => {
    const isKo = !!m.slot;
    const setup = isKo ? koSetup[m.id] : null;
    const ready = !isKo || (setup?.home && setup?.away);
    const mHome = isKo ? (setup?.home||"") : m.home;
    const mAway = isKo ? (setup?.away||"") : m.away;
    const mH = isKo ? (setup?.handicap??0) : m.handicap;
    const res = results[m.id];
    const myPick = (votes[m.id]||{})[activeId];
    const stake = ROUNDS[m.round].stake;
    const isOk = !!res;
    let outcome=null, profit=null;
    if (isOk && myPick && ready) {
      outcome = calcOutcome(res.h, res.a, mH, myPick);
      profit = calcProfit(outcome, stake);
    }
    const od = outcome ? OD[outcome] : null;

    return (
      <div key={m.id} style={{...S.mc, borderColor: od ? (profit>0?"#10b981":profit<0?"#ef4444":"#94a3b8") : "#1e293b"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style={{color:"#475569",fontSize:10}}>
            {isKo ? `${ROUNDS[m.round].label} • ${m.slot} • ${m.date}` : `Nhóm ${m.group} • ${m.date} ${m.time}`}
          </span>
          <span style={{color:"#f59e0b",fontSize:10,fontWeight:700}}>±{stake} cốc bia</span>
        </div>

        {isKo && !setup && <div style={{color:"#334155",fontSize:11,fontStyle:"italic",marginBottom:4}}>{m.label}</div>}

        {ready && <>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontWeight:700,fontSize:14,color:"#f1f5f9",flex:1}}>{mHome}</span>
            <div style={{padding:"2px 10px",textAlign:"center"}}>
              {isOk
                ? <span style={{color:"#60a5fa",fontWeight:800,fontSize:17}}>{res.h} – {res.a}</span>
                : <span style={{color:"#334155",fontSize:11}}>vs</span>}
            </div>
            <span style={{fontWeight:700,fontSize:14,color:"#f1f5f9",flex:1,textAlign:"right"}}>{mAway}</span>
          </div>
          <div style={{textAlign:"center",marginBottom:8}}>
            <span style={{display:"inline-block",padding:"2px 12px",borderRadius:20,
              background:"#1e293b",color:"#fbbf24",fontSize:11,fontWeight:700}}>
              Kèo {hLabel(mH)}
              {mH!==0 && <span style={{color:"#64748b",fontWeight:400}}>{mH<0?` (nhà chấp ${Math.abs(mH)})`:` (nhà được ${mH})`}</span>}
            </span>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:6}}>
            {["home","away"].map(side => {
              const isPick = myPick===side;
              const hcap = side==="home" ? mH : -mH;
              return (
                <button key={side} onClick={()=>handlePick(m.id,side)} style={{
                  flex:1,padding:"10px 6px",borderRadius:10,textAlign:"center",
                  border:`2px solid ${isPick?PC[side]:"#1e293b"}`,
                  background:isPick?PB[side]:"#0f172a",color:isPick?PC[side]:"#64748b",cursor:"pointer"}}>
                  <div style={{fontSize:10,marginBottom:2,opacity:.7}}>{side==="home"?"Đội nhà":"Đội khách"}</div>
                  <div style={{fontWeight:700,fontSize:13,color:isPick?PC[side]:"#94a3b8",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {(side==="home"?mHome:mAway).substring(0,14)}
                  </div>
                  <div style={{fontSize:10,color:"#fbbf24",marginTop:2}}>kèo {hLabel(hcap)}</div>
                  <div style={{fontSize:10,marginTop:2,color:isPick?"#86efac":"#334155"}}>
                    {isPick ? `T: +${stake} / T: -${stake} cốc` : `±${stake} cốc`}
                  </div>
                </button>
              );
            })}
          </div>
          {od && (
            <div style={{textAlign:"center",fontSize:12,fontWeight:700,padding:"6px",
              borderRadius:8,background:od.bg,color:od.color,marginBottom:6}}>
              {od.icon} {od.label} • {fmtC(profit)} bia
            </div>
          )}
        </>}

        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {players.filter(p=>p.id!==activeId).map(p => {
            const pv = (votes[m.id]||{})[p.id]; if(!pv) return null;
            let po = null;
            if (isOk && ready) po = calcOutcome(res.h, res.a, mH, pv);
            const won = po && (po==="win"||po==="half_win");
            const lost = po && (po==="lose"||po==="half_lose");
            return (
              <span key={p.id} style={{fontSize:10,padding:"2px 7px",borderRadius:20,
                background:PB[pv],color:PC[pv]}}>
                {p.name}: {pv==="home"?"Nhà":"Khách"}{won?" ✅":lost?" ❌":po==="push"?" ↩":""}
              </span>
            );
          })}
        </div>
      </div>
    );
  };

  if (loading) return (
    <div style={{background:"#070d1a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"#60a5fa",fontSize:16}}>⚽ Đang tải...</div>
    </div>
  );

  // ── HOME ──
  if (screen==="home") return (
    <div style={S.root}>
      {Toast}
      <div style={S.hero}>
        <div style={{fontSize:44}}>🏆</div>
        <h1 style={S.heroTitle}>WC 2026</h1>
        <div style={{color:"#94a3b8",fontSize:11,marginTop:2}}>Cá cược kèo chấp • {GROUP_MATCHES.length} vòng bảng + {KO_MATCHES.length} vòng loại</div>
        <div style={{display:"flex",justifyContent:"center",gap:10,marginTop:10,flexWrap:"wrap"}}>
          {Object.entries(ROUNDS).map(([k,v])=>(
            <div key={k} style={{textAlign:"center"}}>
              <div style={{color:"#f59e0b",fontWeight:700,fontSize:11}}>±{v.stake} cốc</div>
              <div style={{color:"#475569",fontSize:9}}>{v.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={S.card}>
        <div style={S.lbl}>👥 Người chơi</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input placeholder="Nhập tên..." value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addPlayer()}
            style={{...S.inp,flex:1}}/>
          <button style={S.btnAdd} onClick={addPlayer}>＋</button>
        </div>
        {players.length===0 && <div style={{color:"#334155",fontSize:12,textAlign:"center",padding:"6px 0"}}>Thêm người chơi để bắt đầu</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {players.map(p => {
            const sc = scores[p.id];
            return (
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",
                borderRadius:20,cursor:"pointer",
                background:activeId===p.id?"#1e3a5f":"#0f172a",
                border:`1.5px solid ${activeId===p.id?"#3b82f6":"#1e293b"}`}}
                onClick={()=>setActiveId(activeId===p.id?null:p.id)}>
                <span style={{color:activeId===p.id?"#60a5fa":"#94a3b8",fontSize:13,fontWeight:activeId===p.id?700:400}}>{p.name}</span>
                {sc && sc.total>0 && <span style={{fontSize:10,fontWeight:700,color:sc.profit>0?"#10b981":sc.profit<0?"#ef4444":"#94a3b8"}}>{fmtC(sc.profit)}</span>}
                <span style={{color:"#334155",fontSize:11}} onClick={e=>{e.stopPropagation();removePl(p.id);}}>✕</span>
              </div>
            );
          })}
        </div>
        {activePl && <div style={{marginTop:8,color:"#10b981",fontSize:12}}>✅ Đang xem: <b>{activePl.name}</b></div>}
      </div>

      <div style={{display:"flex",gap:10,padding:"0 14px 16px"}}>
        <button style={S.navBtn} onClick={()=>setScreen("vote")}><span style={{fontSize:24}}>🎯</span><span>Đặt kèo</span></button>
        <button style={S.navBtn} onClick={()=>setScreen("board")}>
          <span style={{fontSize:24}}>📊</span><span>Bảng điểm</span>
          {doneCount>0 && <span style={{fontSize:10,color:"#f59e0b"}}>{doneCount} xong</span>}
        </button>
        <button style={{...S.navBtn,background:"#111827"}} onClick={()=>setScreen("admin")}><span style={{fontSize:24}}>⚙️</span><span>Admin</span></button>
      </div>

      <div style={{textAlign:"center",padding:"0 14px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:11,color:syncing?"#f59e0b":"#334155"}}>{syncing?"⏳ Đang đồng bộ...":"🌐 Shared • tự sync 20s"}</span>
        <button onClick={doRefresh} style={{padding:"4px 10px",borderRadius:20,border:"1px solid #1e293b",
          background:"#0f172a",color:"#60a5fa",cursor:"pointer",fontSize:11}}>
          {syncing?"...":"🔄"}
        </button>
      </div>
    </div>
  );

  // ── VOTE ──
  if (screen==="vote") return (
    <div style={S.root}>
      {Toast}
      <div style={S.topBar}>
        <button style={S.back} onClick={()=>setScreen("home")}>← Về</button>
        <span style={{color:"#f1f5f9",fontSize:14,fontWeight:600}}>{activePl?"🎯 "+activePl.name:"🎯 Đặt kèo"}</span>
        <button onClick={doRefresh} style={{background:"none",border:"none",color:"#60a5fa",cursor:"pointer",fontSize:12}}>{syncing?"⏳":"🔄"}</button>
      </div>
      {!activePl && <div style={S.warn}>⚠️ Về trang chủ để chọn người chơi</div>}
      <div style={{padding:"8px 14px 0",display:"flex",gap:6,overflowX:"auto"}}>
        {[["group","Vòng bảng"],["r32","1/32"],["r16","1/16"],["qf","Tứ kết"],["sf","Bán kết"],["final","CK"]].map(([r,l])=>(
          <button key={r} style={{...S.tab,...(roundF===r?S.tabOn:{})}} onClick={()=>setRoundF(r)}>{l}</button>
        ))}
      </div>
      {roundF==="group" && (
        <div style={{padding:"6px 14px 2px",display:"flex",gap:6,overflowX:"auto"}}>
          {["all",...allDates].map(d=>(
            <button key={d} style={{...S.tab,...(dateF===d?S.tabOn:{})}} onClick={()=>setDateF(d)}>{d==="all"?"Tất cả":d}</button>
          ))}
        </div>
      )}
      <div style={{padding:"6px 12px 100px"}}>{curMatches.map(m=>renderMatch(m))}</div>
    </div>
  );

  // ── BOARD ──
  if (screen==="board") return (
    <div style={S.root}>
      {Toast}
      <div style={S.topBar}>
        <button style={S.back} onClick={()=>setScreen("home")}>← Về</button>
        <span style={{color:"#f1f5f9",fontSize:14,fontWeight:600}}>📊 Bảng điểm</span>
        <button onClick={doRefresh} style={{background:"none",border:"none",color:"#60a5fa",cursor:"pointer",fontSize:12}}>{syncing?"⏳":"🔄"}</button>
      </div>
      <div style={{padding:"12px 14px 80px"}}>
        <div style={{color:"#475569",fontSize:11,textAlign:"center",marginBottom:12}}>{doneCount} / {ALL_MATCHES.length} trận đã có kết quả</div>
        {ranked.length===0 && <div style={{color:"#334155",textAlign:"center",padding:"40px 0"}}>Chưa có người chơi</div>}
        {ranked.map(([id,s],i)=>(
          <div key={id} style={{...S.mc,display:"flex",alignItems:"center",gap:12,
            borderColor:i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#cd7f32":"#1e293b"}}>
            <div style={{width:36,height:36,borderRadius:"50%",flexShrink:0,
              background:i===0?"#78350f":i===1?"#1e293b":i===2?"#292524":"#0f172a",
              color:i===0?"#f59e0b":i===1?"#e2e8f0":i===2?"#cd7f32":"#475569",
              display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:i<3?18:14}}>
              {i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1)}
            </div>
            <div style={{flex:1}}>
              <div style={{color:"#f1f5f9",fontWeight:700,fontSize:15}}>{s.name}</div>
              <div style={{color:"#64748b",fontSize:11,marginTop:2}}>
                ✅{s.won} {s.hw?s.hw+"½W ":""}❌{s.lost} {s.hl?s.hl+"½L ":""}{s.push?"↩"+s.push+" ":""} • {s.total} cược
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:800,fontSize:18,color:s.profit>0?"#10b981":s.profit<0?"#ef4444":"#94a3b8"}}>
                {fmtC(s.profit)}
              </div>
              <div style={{color:"#475569",fontSize:10}}>cốc bia</div>
            </div>
          </div>
        ))}

        {doneCount>0 && <>
          <div style={{color:"#1e3a5f",fontSize:11,fontWeight:600,margin:"20px 0 8px"}}>── CHI TIẾT TỪNG TRẬN ──</div>
          {ALL_MATCHES.filter(m=>results[m.id]).map(m=>{
            const isKo = !!m.slot;
            const setup = isKo ? koSetup[m.id] : null;
            if (isKo && !setup) return null;
            const mHome = isKo ? setup.home : m.home;
            const mAway = isKo ? setup.away : m.away;
            const mH = isKo ? setup.handicap : m.handicap;
            const res = results[m.id];
            const stake = ROUNDS[m.round].stake;
            return (
              <div key={m.id} style={{...S.mc,padding:"10px 12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:"#94a3b8",fontSize:12,fontWeight:600}}>
                    {mHome} <span style={{color:"#60a5fa"}}>{res.h}–{res.a}</span> {mAway}
                  </span>
                  <span style={{color:"#64748b",fontSize:10}}>kèo {hLabel(mH)} • ±{stake}🍺</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {players.map(p=>{
                    const pick = (votes[m.id]||{})[p.id];
                    if (!pick) return <span key={p.id} style={{fontSize:10,color:"#334155"}}>{p.name}: –</span>;
                    const outcome = calcOutcome(res.h, res.a, mH, pick);
                    const profit = calcProfit(outcome, stake);
                    const od = OD[outcome];
                    return (
                      <span key={p.id} style={{fontSize:10,padding:"3px 8px",borderRadius:20,background:od.bg,color:od.color}}>
                        {p.name} {od.icon} {fmtC(profit)}
                      </span>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </>}
      </div>
    </div>
  );

  // ── ADMIN ──
  const adminMatches = roundF==="group" ? GROUP_MATCHES : KO_MATCHES.filter(m=>m.round===roundF);

  if (screen==="admin") return (
    <div style={S.root}>
      {Toast}
      <div style={S.topBar}>
        <button style={S.back} onClick={()=>setScreen("home")}>← Về</button>
        <span style={{color:"#f1f5f9",fontSize:14,fontWeight:600}}>⚙️ Admin</span>
        <span/>
      </div>
      {!adminOk ? (
        <div style={{padding:20}}>
          <div style={{background:"#111827",borderRadius:12,padding:20}}>
            <div style={{color:"#94a3b8",fontSize:14,marginBottom:12}}>Mật khẩu admin:</div>
            <input type="password" placeholder="Nhập mật khẩu..." value={adminPw}
              onChange={e=>setAdminPw(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter") adminPw===ADMIN_PW?setAdminOk(true):flash_("Sai!");}}
              style={{...S.inp,width:"100%",marginBottom:12}}/>
            <button style={{...S.navBtn,width:"100%",justifyContent:"center"}}
              onClick={()=>adminPw===ADMIN_PW?setAdminOk(true):flash_("Sai mật khẩu!")}>Đăng nhập</button>
            <div style={{color:"#334155",fontSize:11,textAlign:"center",marginTop:8}}>Mặc định: wc2026</div>
          </div>
        </div>
      ) : (
        <div>
          <div style={{padding:"8px 14px 4px",display:"flex",gap:6,overflowX:"auto",borderBottom:"1px solid #0f172a"}}>
            {[["group","Vòng bảng"],["r32","1/32"],["r16","1/16"],["qf","Tứ kết"],["sf","Bán kết"],["final","CK"]].map(([r,l])=>(
              <button key={r} style={{...S.tab,...(roundF===r?S.tabOn:{})}} onClick={()=>setRoundF(r)}>{l}</button>
            ))}
          </div>
          <div style={{color:"#10b981",fontSize:11,textAlign:"center",padding:"6px 0"}}>{doneCount}/{ALL_MATCHES.length} trận đã nhập</div>
          <div style={{padding:"4px 12px 100px"}}>
            {adminMatches.map(m => {
              const isKo = !!m.slot;
              const res = results[m.id];
              const setup = isKo ? koSetup[m.id] : null;
              const si = scoreIn[m.id] || {h:res?.h??"", a:res?.a??""};
              const ki = koIn[m.id] || {home:setup?.home??"", away:setup?.away??"", handicap:String(setup?.handicap??0)};
              return (
                <div key={m.id} style={{...S.mc,borderColor:res?"#1e3a5f":"#1e293b",marginBottom:8}}>
                  <div style={{color:"#475569",fontSize:10,marginBottom:4}}>
                    {isKo ? `${ROUNDS[m.round].label} • ${m.slot} • ${m.date}` : `Nhóm ${m.group} • ${m.date} ${m.time}`}
                  </div>

                  {isKo && (
                    <div>
                      <div style={{color:"#64748b",fontSize:11,marginBottom:6,fontStyle:"italic"}}>{m.label}</div>
                      <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                        <input placeholder="Đội nhà" value={ki.home}
                          onChange={e=>setKoIn({...koIn,[m.id]:{...ki,home:e.target.value}})}
                          style={{...S.inp,flex:1,minWidth:100}}/>
                        <input placeholder="Đội khách" value={ki.away}
                          onChange={e=>setKoIn({...koIn,[m.id]:{...ki,away:e.target.value}})}
                          style={{...S.inp,flex:1,minWidth:100}}/>
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"flex-end",marginBottom:6}}>
                        <div>
                          <div style={{color:"#475569",fontSize:9,marginBottom:2}}>Kèo chấp</div>
                          <input type="number" step="0.25" placeholder="0" value={ki.handicap}
                            onChange={e=>setKoIn({...koIn,[m.id]:{...ki,handicap:e.target.value}})}
                            style={{...S.inp,width:80,textAlign:"center"}}/>
                        </div>
                        <button style={{...S.btnAdd,padding:"7px 14px",fontSize:12}} onClick={()=>saveKo(m.id)}>💾 Lưu</button>
                      </div>
                      {setup && <div style={{color:"#10b981",fontSize:11,marginBottom:6}}>✓ {setup.home} vs {setup.away} | kèo {hLabel(setup.handicap)}</div>}
                    </div>
                  )}

                  {!isKo && (
                    <div style={{color:"#f1f5f9",fontSize:13,fontWeight:600,marginBottom:6}}>
                      {m.home} <span style={{color:"#fbbf24",fontSize:11,fontWeight:400}}>({hLabel(m.handicap)})</span> vs {m.away}
                    </div>
                  )}

                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{color:"#64748b",fontSize:11}}>Tỉ số:</span>
                    <input type="number" min={0} max={20} placeholder="Nhà" value={si.h}
                      onChange={e=>setScoreIn({...scoreIn,[m.id]:{...si,h:e.target.value}})}
                      style={{...S.inp,width:52,textAlign:"center"}}/>
                    <span style={{color:"#475569",fontWeight:700}}>–</span>
                    <input type="number" min={0} max={20} placeholder="Khách" value={si.a}
                      onChange={e=>setScoreIn({...scoreIn,[m.id]:{...si,a:e.target.value}})}
                      style={{...S.inp,width:52,textAlign:"center"}}/>
                    <button style={{...S.btnAdd,padding:"7px 12px",fontSize:12}} onClick={()=>saveResult(m.id)}>✓ Lưu</button>
                    {res && <button style={{padding:"7px 10px",borderRadius:8,border:"none",background:"#1e293b",color:"#ef4444",cursor:"pointer",fontSize:12}} onClick={()=>clearResult(m.id)}>✕</button>}
                  </div>

                  {res && (
                    <div style={{marginTop:8}}>
                      <div style={{color:"#60a5fa",fontSize:12,marginBottom:4}}>Tỉ số: <b>{res.h} – {res.a}</b></div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {players.map(p=>{
                          const pick = (votes[m.id]||{})[p.id];
                          if (!pick) return <span key={p.id} style={{fontSize:10,color:"#334155"}}>{p.name}: –</span>;
                          const mH2 = isKo ? (setup?.handicap??0) : m.handicap;
                          const outcome = calcOutcome(res.h, res.a, mH2, pick);
                          const profit = calcProfit(outcome, ROUNDS[m.round].stake);
                          const od = OD[outcome];
                          return (
                            <span key={p.id} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:od.bg,color:od.color}}>
                              {p.name} {od.icon} {fmtC(profit)}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );

  return null;
}

const S = {
  root:      {background:"#070d1a",minHeight:"100vh",fontFamily:"'Segoe UI',sans-serif",color:"#f1f5f9",maxWidth:500,margin:"0 auto"},
  hero:      {background:"linear-gradient(150deg,#0c1445,#1a1f5e 50%,#0a2744)",padding:"22px 20px 16px",textAlign:"center",borderBottom:"1px solid #0f172a"},
  heroTitle: {margin:"4px 0 0",fontSize:26,fontWeight:900,letterSpacing:3,background:"linear-gradient(90deg,#f59e0b,#fbbf24,#f59e0b)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"},
  card:      {margin:"12px 14px",background:"#0d1424",borderRadius:12,padding:"14px",border:"1px solid #1e293b"},
  lbl:       {color:"#64748b",fontSize:11,fontWeight:600,marginBottom:10,letterSpacing:1},
  inp:       {background:"#111827",border:"1px solid #1e293b",borderRadius:8,color:"#f1f5f9",padding:"7px 10px",fontSize:13,outline:"none"},
  btnAdd:    {padding:"7px 14px",borderRadius:8,border:"none",background:"#1e3a5f",color:"#60a5fa",cursor:"pointer",fontSize:14,fontWeight:700},
  navBtn:    {flex:1,padding:"14px 6px",borderRadius:12,background:"linear-gradient(135deg,#1e3a5f,#1a2744)",border:"1px solid #1e3a5f",color:"#93c5fd",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,fontSize:11,fontWeight:600},
  topBar:    {display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",borderBottom:"1px solid #0f172a",background:"#070d1a",position:"sticky",top:0,zIndex:10},
  back:      {background:"none",border:"none",color:"#60a5fa",cursor:"pointer",fontSize:13,padding:0},
  mc:        {background:"#0d1424",borderRadius:12,padding:"13px",marginBottom:10,border:"1px solid #1e293b"},
  warn:      {background:"#1e3a5f",borderRadius:10,padding:"10px 14px",margin:"10px 14px",color:"#93c5fd",fontSize:13},
  tab:       {padding:"5px 11px",borderRadius:20,border:"1px solid #1e293b",background:"#0f172a",color:"#475569",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",flexShrink:0},
  tabOn:     {background:"#1e3a5f",color:"#60a5fa",border:"1px solid #3b82f6"},
};


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
